name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Fail the build only on real errors (syntax errors, undefined names).
          # Style-only issues are reported but don't block the pipeline.
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src --count --exit-zero --max-line-length=120 --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  verify-deployment:
    name: Verify live deployment (CD smoke test)
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Streamlit Cloud to redeploy
        run: sleep 90

      - name: Smoke test the live app
        run: |
          # Streamlit Community Cloud auto-deploys on push to main.
          # This job doesn't trigger the deploy — it verifies it actually
          # came up healthy afterward, retrying to allow for cold starts.
          url="https://ai-fun-quiz.streamlit.app/"
          for attempt in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url")
            echo "Attempt $attempt: HTTP $status"
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "Deployment healthy."
              exit 0
            fi
            sleep 20
          done
          echo "Deployment did not respond healthy after 5 attempts."
          exit 1
